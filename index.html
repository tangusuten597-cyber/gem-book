<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>宝石図鑑</title><style>
  
body{
  
    font-family:sans-serif;
  
    background:#f5f5f5;
  
    margin:20px;
  
}
  

  
h1{text-align:center;}
  

  
.form{
  
    background:white;
  
    padding:15px;
  
    border-radius:10px;
  
    margin-bottom:20px;
  
}
  

  
input{
  
    width:100%;
  
    padding:10px;
  
    margin:5px 0;
  
    box-sizing:border-box;
  
}
  

  
/* グリッド */
  
.grid{
  
    display:grid;
  
    grid-template-columns:repeat(3,1fr);
  
    gap:6px;
  
}
  

  
/* カード */
  
.card{
  
    background:white;
  
    border-radius:8px;
  
    box-shadow:0 1px 3px rgba(0,0,0,.15);
  

  
    display:flex;
  
    flex-direction:column;
  

  
    height:220px;
  
    overflow:hidden;
  
}
  

  
/* 画像 */
  
.card img{
  
    width:100%;
  
    height:80px;
  
    object-fit:cover;
  
}
  

  
/* 名前 */
  
.card h3{
  
    font-size:12px;
  
    margin:4px;
  
    line-height:1.2;
  

  
    display:-webkit-box;
  
    -webkit-line-clamp:2;
  
    -webkit-box-orient:vertical;
  
    overflow:hidden;
  

  
    min-height:2.4em;
  
}
  

  
/* 中身 */
  
.card-body{
  
    padding:4px;
  
    display:flex;
  
    flex-direction:column;
  
    flex:1;
  
}
  

  
/* タグ */
  
.tag-area{
  
    min-height:50px;
  
    display:flex;
  
    flex-wrap:wrap;
  
    gap:3px;
  
    align-items:flex-start;
  
    align-content:flex-start;
  
}
  

  
.tag{
  
    display:inline-flex;
  
    align-items:center;
  
    justify-content:center;
  

  
    background:#4a90e2;
  
    color:white;
  

  
    padding:2px 6px;
  
    border-radius:999px;
  

  
    font-size:11px;
  
    white-space:nowrap;
  
}
  

  
/* ボタン */
  
.button-area{
  
    margin-top:auto;
  
    display:flex;
  
    gap:6px;
  
    padding:4px;
  
}
  

  
.button-area button{
  
    flex:1;
  
    height:28px;
  
    font-size:10px;
  
    cursor:pointer;
  
}
  

  
/* モーダル */
  
.modal{
  
    display:none;
  
    position:fixed;
  
    top:0;left:0;
  
    width:100%;height:100%;
  
    background:rgba(0,0,0,0.5);
  
    justify-content:center;
  
    align-items:center;
  
}
  

  
.modal-content{
  
    background:white;
  
    padding:15px;
  
    border-radius:10px;
  
    width:90%;
  
    max-width:400px;
  
}

/* ページネーション */
.pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-top: 20px;
}

.pagination button {
    padding: 5px 10px;
    cursor: pointer;
}
  
</style></head><body><h1>💎 宝石図鑑</h1><div class="form"><input id="photo" type="file" accept="image/*"><input id="name" placeholder="宝石名"><input id="tags" placeholder="タグ（カンマ区切り）"><button onclick="saveGem()">登録</button>

</div><input id="search" placeholder="検索" oninput="resetPageAndRender()"><div id="gallery" class="grid"></div><div class="pagination"><button id="prevBtn" onclick="changePage(-1)">前へ</button><span id="pageInfo"></span><button id="nextBtn" onclick="changePage(1)">次へ</button></div><div id="modal" class="modal"><div class="modal-content"><h3>編集</h3><textarea id="editName"></textarea><input id="editTags" placeholder="タグ"><button onclick="saveEdit()">保存</button>

<button onclick="closeEdit()">キャンセル</button>

</div></div><script>
  

  
let gems = JSON.parse(localStorage.getItem("gems")) || [];
  

  
let editId = null;

// ページネーション用変数
let currentPage = 1;
const itemsPerPage = 12;
  

  
/* ---------------- 保存 ---------------- */
  
function saveGem(){
  

  
    const file = document.getElementById("photo").files[0];
  
    const name = document.getElementById("name").value;
  
    const tags = document.getElementById("tags").value;
  

  
    if(!file || !name) return alert("必須");
  

  
    const reader = new FileReader();
  

  
    reader.onload = e => {
  

  
        gems.push({
  
            id: Date.now(),
  
            image: e.target.result,
  
            name,
  
            tags: tags
  
                .split(",")
  
                .map(t => t.trim())
  
                .filter(Boolean)
  
        });
  

  
        localStorage.setItem("gems", JSON.stringify(gems)); // ここで保存処理を行っています
        resetPageAndRender();
  
    };
  

  
    reader.readAsDataURL(file);
  
}
  

  
/* ---------------- 削除 ---------------- */
  
function deleteGem(id){
  
    gems = gems.filter(g => g.id !== id);
  
    localStorage.setItem("gems", JSON.stringify(gems));
    
    // 削除によって現在のページが空になった場合のケア
    const keyword = document.getElementById("search").value.toLowerCase();
    const filtered = gems.filter(g =>
        (g.name || "").toLowerCase().includes(keyword) ||
        (g.tags || []).join(",").toLowerCase().includes(keyword)
    );
    const maxPage = Math.ceil(filtered.length / itemsPerPage) || 1;
    if (currentPage > maxPage) {
        currentPage = maxPage;
    }
  
    render();
  
}
  

  
/* ---------------- 編集 ---------------- */
  
function openEdit(id){
  

  
    const g = gems.find(x => x.id === id);
  
    if(!g) return;
  

  
    editId = id;
  

  
    document.getElementById("editName").value = g.name;
  
    document.getElementById("editTags").value = (g.tags || []).join(",");
  

  
    document.getElementById("modal").style.display = "flex";
  
}
  

  
function closeEdit(){
  
    document.getElementById("modal").style.display = "none";
  
    editId = null;
  
}
  

  
function saveEdit(){
  

  
    const g = gems.find(x => x.id === editId);
  
    if(!g) return;
  

  
    g.name = document.getElementById("editName").value;
  

  
    g.tags = document.getElementById("editTags").value
  
        .split(",")
  
        .map(t => t.trim())
  
        .filter(Boolean);
  

  
    localStorage.setItem("gems", JSON.stringify(gems));
  

  
    closeEdit();
  
    render();
  
}

/* ---------------- ページ操作 ---------------- */
function resetPageAndRender(){
    currentPage = 1;
    render();
}

function changePage(direction) {
    currentPage += direction;
    render();
}
  

  
/* ---------------- 表示 ---------------- */
  
function render(){
  

  
    const gallery = document.getElementById("gallery");
  
    gallery.innerHTML = "";
  

  
    const keyword =
  
        document.getElementById("search").value.toLowerCase();
  

  
    let filtered = gems.filter(g =>
  
        (g.name || "").toLowerCase().includes(keyword) ||
  
        (g.tags || []).join(",").toLowerCase().includes(keyword)
  
    );
  

  
    /* ソート（そのまま維持） */
  
    filtered.sort((a, b) => {
  

  
        const tagsA = a.tags || [];
  
        const tagsB = b.tags || [];
  

  
        const a1 = (tagsA[0] || "").toLowerCase();
  
        const b1 = (tagsB[0] || "").toLowerCase();
  

  
        const first = a1.localeCompare(b1);
  
        if (first !== 0) return first;
  

  
        const a2 = (tagsA[1] || "").toLowerCase();
  
        const b2 = (tagsB[1] || "").toLowerCase();
  

  
        const second = a2.localeCompare(b2);
  
        if (second !== 0) return second;
  

  
        return (a.name || "").toLowerCase()
  
            .localeCompare((b.name || "").toLowerCase());
  
    });
  
    // ページネーションの計算
    const totalItems = filtered.length;
    const maxPage = Math.ceil(totalItems / itemsPerPage) || 1;
    
    // 表示する範囲を切り出し
    const startIndex = (currentPage - 1) * itemsPerPage;
    const endIndex = startIndex + itemsPerPage;
    const pageItems = filtered.slice(startIndex, endIndex);

    pageItems.forEach(g => {
  

  
        gallery.innerHTML += `
  
        <div class="card">
  

  
            <img src="${g.image}">
  

  
            <div class="card-body">
  

  
                <h3 style="white-space: pre-line;">${g.name}</h3>
  

  
                <div class="tag-area">
  
                ${(g.tags || []).map(t =>
  
                    `<span class="tag">#${t}</span>`
  
                ).join("")}
  
                </div>
  

  
                <div class="button-area">
  
                    <button onclick="openEdit(${g.id})">編集</button>
  
                    <button onclick="deleteGem(${g.id})">削除</button>
  
                </div>
  

  
            </div>
  
        </div>
  
        `;
  
    });
    
    // ページネーションUIの更新
    document.getElementById("pageInfo").innerText = `${currentPage} / ${maxPage}`;
    document.getElementById("prevBtn").disabled = (currentPage === 1);
    document.getElementById("nextBtn").disabled = (currentPage === maxPage);
}
  

  
render();
  

  
</script></body></html>
