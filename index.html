<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>宝石図鑑</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4a90e2">

<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:20px;
}

h1{text-align:center;}

.form{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    box-sizing:border-box;
}

button{
    padding:8px;
    margin-top:8px;
    cursor:pointer;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;      /* ←余白を詰める */
    padding: 4px;  /* ←外側も詰める */
}

.card {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);

    display: flex;
    flex-direction: column;
}

.card img {
    width: 100%;
    height: 90px;
    object-fit: cover;
    flex-shrink: 0;
}

.card h3 {
    font-size: 12px;
    line-height: 1.2;
    margin: 4px 0;

    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;

    min-height: 2.4em; /* ←高さ固定のカギ */
}

.card button {
    margin-top: auto; /* ←これが神ポイント */
}

.card-body {
    padding: 6px;
    display: flex;
    flex-direction: column;
    flex: 1;
}

.tag {
    display: inline-block;
    background: #4a90e2;
    color: white;
    padding: 2px 6px;
    border-radius: 999px;
    margin: 2px;
    font-size: 11px;
    cursor: pointer;

    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.tags {
    min-height: 28px;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
}

#pagination{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:15px;
}

/* 🔧 モーダル（編集画面） */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:15px;
    border-radius:10px;
    width:90%;
    max-width:400px;
}
</style>
</head>

<body>

<h1>💎 宝石図鑑</h1>

<div class="form">
<input type="file" id="photo" accept="image/*">
<input type="text" id="name" placeholder="宝石名">
<input type="text" id="tags" placeholder="タグ（カンマ区切り）">
<textarea id="memo" placeholder="メモ"></textarea>
<button onclick="saveGem()">登録</button>
</div>

<input type="text" id="search" placeholder="検索" oninput="render()">

<button onclick="clearTagFilter()">タグ解除</button>

<div id="gallery" class="grid"></div>

<div id="pagination">
<button onclick="prevPage()">← 前</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">次 →</button>
</div>

<!-- 🔧 編集モーダル -->
<div id="modal" class="modal">
<div class="modal-content">

<h3>編集</h3>

<input id="editName" placeholder="名前">
<input id="editTags" placeholder="タグ">
<textarea id="editMemo"></textarea>

<button onclick="saveEdit()">保存</button>
<button onclick="closeModal()">キャンセル</button>

</div>
</div>

<script>

let gems = JSON.parse(localStorage.getItem("gems")) || [];

let currentTag = "";
let currentPage = 1;
const pageSize = 12;

let editIndex = null;

/* ---------------- 登録 ---------------- */

function saveGem(){

    const file = document.getElementById("photo").files[0];
    const name = document.getElementById("name").value;
    const tags = document.getElementById("tags").value;
    const memo = document.getElementById("memo").value;

    if(!file || !name){
        alert("写真と名前必須");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        gems.push({
            image:e.target.result,
            name,
            tags,
            memo
        });

        localStorage.setItem("gems",JSON.stringify(gems));
        render();
    };

    reader.readAsDataURL(file);
}

/* ---------------- フィルタ ---------------- */

function filterByTag(tag){
    currentTag = tag;
    currentPage = 1;
    render();
}

function clearTagFilter(){
    currentTag = "";
    currentPage = 1;
    render();
}

/* ---------------- 削除 ---------------- */

function deleteGem(index){

    if(confirm("削除する？")){
        gems.splice(index,1);
        localStorage.setItem("gems",JSON.stringify(gems));
        render();
    }
}

/* ---------------- 編集 ---------------- */

function openEdit(index){

    editIndex = index;

    const g = gems[index];

    document.getElementById("editName").value = g.name;
    document.getElementById("editTags").value = g.tags;
    document.getElementById("editMemo").value = g.memo;

    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
    editIndex = null;
}

function saveEdit(){

    if(editIndex === null) return;

    gems[editIndex].name =
        document.getElementById("editName").value;

    gems[editIndex].tags =
        document.getElementById("editTags").value;

    gems[editIndex].memo =
        document.getElementById("editMemo").value;

    localStorage.setItem("gems",JSON.stringify(gems));

    closeModal();
    render();
}

/* ---------------- ページ ---------------- */

function nextPage(){
    const max = Math.ceil(getFiltered().length / pageSize);
    if(currentPage < max){
        currentPage++;
        render();
    }
}

function prevPage(){
    if(currentPage > 1){
        currentPage--;
        render();
    }
}

/* ---------------- フィルタ ---------------- */

function getFiltered(){

    const keyword =
        document.getElementById("search")
        .value.toLowerCase();

    return gems.filter(g => {

        const keywordMatch =
            g.name.toLowerCase().includes(keyword) ||
            g.tags.toLowerCase().includes(keyword);

        const tagMatch =
            currentTag === "" ||
            g.tags.split(",")
            .map(t=>t.trim())
            .includes(currentTag);

        return keywordMatch && tagMatch;
    });
}

/* ---------------- 描画 ---------------- */

function render(){

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    const filtered = getFiltered();

    const start = (currentPage - 1) * pageSize;
    const pageItems = filtered.slice(start,start + pageSize);

    pageItems.forEach(g => {

        const index = gems.indexOf(g);

        gallery.innerHTML += `
        <div class="card">

            <img src="${g.image}">

            <div class="card-body">

                <h3>${g.name}</h3>

                <div>
                ${g.tags.split(",").map(tag=>
                    `<span class="tag"
                    onclick="filterByTag('${tag.trim()}')">
                    #${tag.trim()}
                    </span>`
                ).join("")}
                </div>

                <p>${g.memo}</p>

                <button onclick="openEdit(${index})">
                編集
                </button>

                <button onclick="deleteGem(${index})">
                削除
                </button>

            </div>
        </div>
        `;
    });

    const maxPage = Math.ceil(filtered.length / pageSize);

    document.getElementById("pageInfo").textContent =
        `${currentPage} / ${maxPage || 1}`;
}

render();

/* ---------------- PWA ---------------- */

if("serviceWorker" in navigator){
    navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
