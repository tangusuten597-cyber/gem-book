<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝石図鑑</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f5f5f5;
            margin: 20px;
        }

        h1 { text-align: center; }

        /* ナビゲーションタブ */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .nav-tabs button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #ddd;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-tabs button.active {
            background: #4a90e2;
            color: white;
        }

        /* ビューの表示制御 */
        .view-section {
            display: none;
        }
        .view-section.active {
            display: block;
        }

        .form {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            box-sizing: border-box;
        }

        /* グリッド */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        /* カード */
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(0,0,0,.15);
            display: flex;
            flex-direction: column;
            height: 220px;
            overflow: hidden;
        }

        /* 画像 */
        .card img {
            width: 100%;
            height: 80px;
            object-fit: cover;
        }

        /* 名前 */
        .card h3 {
            font-size: 12px;
            margin: 4px;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.4em;
        }

        /* 中身 */
        .card-body {
            padding: 4px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* タグ */
        .tag-area {
            min-height: 50px;
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            align-items: flex-start;
            align-content: flex-start;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #4a90e2;
            color: white;
            padding: 2px 6px;
            border-radius: 999px;
            font-size: 8px;
            white-space: nowrap;
            cursor: pointer;
        }

        /* ボタン */
        .button-area {
            margin-top: auto;
            display: flex;
            gap: 6px;
            padding: 4px;
        }

        .button-area button {
            flex: 1;
            height: 28px;
            font-size: 10px;
            cursor: pointer;
        }

        /* モーダル */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }

        /* ページネーションUI */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        .pagination button {
            padding: 5px 10px;
            cursor: pointer;
        }
        .page-jump {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .page-jump input {
            width: 50px;
            padding: 4px;
            margin: 0;
            text-align: center;
        }

        /* タグ一覧ページのスタイル */
        .tag-list-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            list-style: none;
            padding: 0;
        }
        .tag-item {
            background: #e1f0ff;
            color: #4a90e2;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .tag-item:hover {
            background: #4a90e2;
            color: white;
        }
        .tag-count {
            font-size: 11px;
            margin-left: 5px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <h1>💎 宝石図鑑</h1>

    <div class="nav-tabs">
        <button id="tab-gallery" class="active" onclick="switchView('gallery')">図鑑一覧</button>
        <button id="tab-tags" onclick="switchView('tags')">タグ一覧</button>
    </div>

    <div id="view-gallery" class="view-section active">
        <div class="form">
            <input id="photo" type="file" accept="image/*">
            <input id="name" placeholder="宝石名">
            <input id="tags" placeholder="タグ（カンマ区切り）">
            <button onclick="saveGem()">登録</button>
        </div>

        <input id="search" placeholder="検索" oninput="currentPage=1;render()">
        
        <div id="gallery" class="grid"></div>

        <div class="pagination">
            <button id="prevBtn" onclick="changePage(-1)">前へ</button>
            <span id="pageInfo"></span>
            <button id="nextBtn" onclick="changePage(1)">次へ</button>
            
            <div class="page-jump">
                <input id="jumpPageNum" type="number" min="1" placeholder="頁">
                <button onclick="jumpToPage()">移動</button>
            </div>
        </div>
    </div>

    <div id="view-tags" class="view-section">
        <div class="tag-list-container">
            <h3>集計タグ一覧</h3>
            <p style="font-size: 12px; color: #666;">※タグをクリックすると、そのタグで検索された図鑑に移動します。</p>
            <ul id="tagList" class="tag-list"></ul>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>編集</h3>
            <textarea id="editName" style="width:100%; box-sizing:border-box; min-height:60px;"></textarea>
            <input id="editTags" placeholder="タグ">
            <button onclick="saveEdit()">保存</button>
            <button onclick="closeEdit()">キャンセル</button>
        </div>
    </div>

<script>
    // スマホのローカルストレージ（大容量領域 IndexedDB）への接続準備
    let db;
    const request = indexedDB.open("GemDatabase", 1);

    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("gems", { keyPath: "id" });
    };

    request.onsuccess = e => {
        db = e.target.result;
        loadGems(); // 起動時にスマホ内からデータをロード
    };

    let gems = [];
    let editId = null;

    // ページ管理用の変数（1ページあたり12個）
    let currentPage = 1;
    const itemsPerPage = 12;
    let maxPage = 1;

    // スマホからデータを読み込む関数
    function loadGems() {
        const transaction = db.transaction(["gems"], "readonly");
        const store = transaction.objectStore("gems");
        const getAllRequest = store.getAll();

        getAllRequest.onsuccess = () => {
            gems = getAllRequest.result || [];
            render();
            renderTagList();
        };
    }

    /* ---------------- 画面切り替え ---------------- */
    function switchView(viewName) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-tabs button').forEach(el => el.classList.remove('active'));

        if (viewName === 'gallery') {
            document.getElementById('view-gallery').classList.add('active');
            document.getElementById('tab-gallery').classList.add('active');
            render();
        } else if (viewName === 'tags') {
            document.getElementById('view-tags').classList.add('active');
            document.getElementById('tab-tags').classList.add('active');
            renderTagList();
        }
    }

    /* ---------------- 保存 ---------------- */
    function saveGem(){
        const file = document.getElementById("photo").files[0];
        const name = document.getElementById("name").value;
        const tags = document.getElementById("tags").value;

        if(!file || !name) return alert("必須");

        const reader = new FileReader();

        reader.onload = e => {
            const newGem = {
                id: Date.now(),
                image: e.target.result,
                name,
                tags: tags
                    .split(",")
                    .map(t => t.trim())
                    .filter(Boolean)
            };
            // スマホの保存領域（IndexedDB）に書き込み
            const transaction = db.transaction(["gems"], "readwrite");
            const store = transaction.objectStore("gems");
            const addRequest = store.add(newGem);

            addRequest.onsuccess = () => {
                gems.push(newGem);
                // 入力欄のクリア処理は削除しました（元の状態を維持）
                render();
                renderTagList();
            };
        };

        reader.readAsDataURL(file);
    }

    /* ---------------- 削除 ---------------- */
    function deleteGem(id){
        if (!confirm("本当にこの宝石を削除してもよろしいですか？")) {
            return;
        }

        const transaction = db.transaction(["gems"], "readwrite");
        const store = transaction.objectStore("gems");
        const deleteRequest = store.delete(id);

        deleteRequest.onsuccess = () => {
            gems = gems.filter(g => g.id !== id);
            render();
            renderTagList();
        };
    }

    /* ---------------- 編集 ---------------- */
    function openEdit(id){
        const g = gems.find(x => x.id === id);
        if(!g) return;

        editId = id;

        document.getElementById("editName").value = g.name;
        document.getElementById("editTags").value = (g.tags || []).join(",");

        document.getElementById("modal").style.display = "flex";
    }

    function closeEdit(){
        document.getElementById("modal").style.display = "none";
        editId = null;
    }

    function saveEdit(){
        const g = gems.find(x => x.id === editId);
        if(!g) return;

        g.name = document.getElementById("editName").value;
        g.tags = document.getElementById("editTags").value
            .split(",")
            .map(t => t.trim())
            .filter(Boolean);

        const transaction = db.transaction(["gems"], "readwrite");
        const store = transaction.objectStore("gems");
        const updateRequest = store.put(g);

        updateRequest.onsuccess = () => {
            closeEdit();
            render();
            renderTagList();
        };
    }

    /* ---------------- ページ切り替え・ジャンプ ---------------- */
    function changePage(direction) {
        currentPage += direction;
        render();
    }

    function jumpToPage() {
        const jumpInput = document.getElementById("jumpPageNum");
        const targetPage = parseInt(jumpInput.value, 10);

        if (isNaN(targetPage) || targetPage < 1 || targetPage > maxPage) {
            alert(`1 から ${maxPage} の間の数字を入力してください。`);
            return;
        }

        currentPage = targetPage;
        render();
        jumpInput.value = ""; // 入力欄をクリア
    }

    /* ---------------- タグ一覧ページの生成 ---------------- */
    function renderTagList() {
        const tagListEl = document.getElementById("tagList");
        tagListEl.innerHTML = "";

        // 全データからタグとカウントを計測
        const tagCounts = {};
        gems.forEach(g => {
            (g.tags || []).forEach(tag => {
                tagCounts[tag] = (tagCounts[tag] || 0) + 1;
            });
        });

        // タグ名でソートしてリスト表示
        const sortedTags = Object.keys(tagCounts).sort();

        if (sortedTags.length === 0) {
            tagListEl.innerHTML = "<li style='color:#999; font-size:14px;'>登録されているタグがありません。</li>";
            return;
        }

        sortedTags.forEach(tag => {
            const li = document.createElement("li");
            li.className = "tag-item";
            li.innerHTML = `#${tag} <span class="tag-count">(${tagCounts[tag]})</span>`;
            li.onclick = () => {
                // タグをクリックしたら検索窓に入れて図鑑ビューに戻る
                document.getElementById("search").value = tag;
                currentPage = 1;
                switchView('gallery');
            };
            tagListEl.appendChild(li);
        });
    }

    /* ---------------- 表示（図鑑） ---------------- */
    function render(){
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = "";

        const keyword = document.getElementById("search").value.toLowerCase();

        let filtered = gems.filter(g =>
            (g.name || "").toLowerCase().includes(keyword) ||
            (g.tags || []).join(",").toLowerCase().includes(keyword)
        );

        /* ソート */
        filtered.sort((a, b) => {
            const tagsA = a.tags || [];
            const tagsB = b.tags || [];

            const a1 = (tagsA[0] || "").toLowerCase();
            const b1 = (tagsB[0] || "").toLowerCase();

            const first = a1.localeCompare(b1);
            if (first !== 0) return first;

            const a2 = (tagsA[1] || "").toLowerCase();
            const b2 = (tagsB[1] || "").toLowerCase();

            const second = a2.localeCompare(b2);
            if (second !== 0) return second;

            return (a.name || "").toLowerCase().localeCompare((b.name || "").toLowerCase());
        });

        // ページ数の計算とガード処理
        const totalItems = filtered.length;
        maxPage = Math.ceil(totalItems / itemsPerPage) || 1;
        if (currentPage > maxPage) currentPage = maxPage;
        if (currentPage < 1) currentPage = 1;

        // 現在のページの12個だけを切り出してループ処理
        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const pageItems = filtered.slice(startIndex, endIndex);

        pageItems.forEach(g => {
            gallery.innerHTML += `
            <div class="card">
                <img src="${g.image}">
                <div class="card-body">
                    <h3 style="white-space: pre-line;">${g.name}</h3>
                    <div class="tag-area">
                    ${(g.tags || []).map(t =>
                        `<span class="tag" onclick="event.stopPropagation(); document.getElementById('search').value='${t}'; currentPage=1; render();">#${t}</span>`
                    ).join("")}
                    </div>
                    <div class="button-area">
                        <button onclick="openEdit(${g.id})">編集</button>
                        <button onclick="deleteGem(${g.id})">削除</button>
                    </div>
                </div>
            </div>
            `;
        });

        // ページネーションUIの更新
        document.getElementById("pageInfo").innerText = `${currentPage} / ${maxPage}`;
        document.getElementById("prevBtn").disabled = (currentPage === 1);
        document.getElementById("nextBtn").disabled = (currentPage === maxPage);
        
        // ジャンプ機能の入力最大値を設定
        document.getElementById("jumpPageNum").max = maxPage;
    }
</script>
</body>
</html>
