<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>宝石図鑑</title>

<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:20px;
}

h1{text-align:center;}

.form{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    box-sizing:border-box;
}

button {
    padding: 4px 6px;
    font-size: 10px;
    margin-top: 4px;
    cursor: pointer;
}

/* =========================
   GRID（ズレ防止の核心）
========================= */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 4px;

    align-items: stretch; /* ←これ超重要 */
}

/* =========================
   CARD（高さ固定）
========================= */
.card {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);

    display: flex;
    flex-direction: column;

    height: 180px; /* ←固定（ズレ防止の本体） */
}

/* 画像固定 */
.card img {
    width: 100%;
    height: 80px;
    object-fit: cover;
}

/* 名前（2行まで） */
.card h3 {
    font-size: 12px;
    line-height: 1.2;
    margin: 4px;

    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;

    min-height: 2.4em;
}

/* 中身エリア */
.card-body {
    padding: 4px;
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
}

/* ボタンは下固定 */
.card button {
    margin-top: auto;
}

/* =========================
   TAG（暴れ防止）
========================= */
.tag {
    display: inline-block;
    background: #4a90e2;
    color: white;
    padding: 2px 6px;
    border-radius: 999px;
    margin: 2px;
    font-size: 11px;
    cursor: pointer;

    white-space: nowrap;
}

.tags {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;

    min-height: 36px; /* ←ここで安定化 */
    overflow: hidden; /* ←はみ出し防止 */
}

/* pagination */
#pagination{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:15px;
}
</style>
</head>

<body>

<h1>💎 宝石図鑑</h1>

<div class="form">
<input type="file" id="photo">
<input type="text" id="name" placeholder="宝石名">
<input type="text" id="tags" placeholder="タグ（カンマ区切り）">
<button onclick="saveGem()">登録</button>
</div>

<input type="text" id="search" placeholder="検索" oninput="render()">

<div id="gallery" class="grid"></div>

<div id="pagination">
<button onclick="prevPage()">← 前</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">次 →</button>
</div>

<script>

let gems = JSON.parse(localStorage.getItem("gems")) || [];

let currentPage = 1;
const pageSize = 12;

/* ---------------- 登録 ---------------- */
function saveGem(){

    const file = document.getElementById("photo").files[0];
    const name = document.getElementById("name").value;
    const tags = document.getElementById("tags").value;

    if(!file || !name){
        alert("写真と名前必須");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        gems.push({
            id: Date.now(),
            image: e.target.result,
            name,
            tags
        });

        localStorage.setItem("gems", JSON.stringify(gems));
        render();
    };

    reader.readAsDataURL(file);
}

/* ---------------- 検索 ---------------- */
function getFiltered(){

    const keyword = document.getElementById("search").value.toLowerCase();

    return gems.filter(g =>
        g.name.toLowerCase().includes(keyword) ||
        (g.tags || "").toLowerCase().includes(keyword)
    );
}

/* ---------------- 描画 ---------------- */
function render(){

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    const filtered = getFiltered();

    const start = (currentPage - 1) * pageSize;
    const pageItems = filtered.slice(start, start + pageSize);

    pageItems.forEach(g => {

        gallery.innerHTML += `
        <div class="card">

            <img src="${g.image}">

            <div class="card-body">

                <h3>${g.name}</h3>

                <div class="tags">
                ${(g.tags || "")
                    .split(",")
                    .map(t => t.trim())
                    .filter(t => t)
                    .map(tag =>
                        `<span class="tag">#${tag}</span>`
                    ).join("")}
                </div>

                <button onclick="deleteGem(${g.id})">削除</button>

            </div>
        </div>
        `;
    });

    const max = Math.ceil(filtered.length / pageSize);
    document.getElementById("pageInfo").textContent =
        `${currentPage} / ${max || 1}`;
}

/* ---------------- 削除 ---------------- */
function deleteGem(id){
    gems = gems.filter(g => g.id !== id);
    localStorage.setItem("gems", JSON.stringify(gems));
    render();
}

/* ---------------- ページ ---------------- */
function nextPage(){
    currentPage++;
    render();
}

function prevPage(){
    if(currentPage > 1){
        currentPage--;
        render();
    }
}

render();

</script>

</body>
</html>
