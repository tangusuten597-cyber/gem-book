<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>宝石図鑑</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4a90e2">

<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:20px;
}

h1{text-align:center;}

.form{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    box-sizing:border-box;
}

button {
    padding: 4px 6px;
    font-size: 10px;
    margin-top: 4px;
    cursor: pointer;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 4px;
}

.card {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);

    display: flex;
    flex-direction: column;
}

.card img {
    width: 100%;
    height: 80px;
    object-fit: cover;
}

.card h3 {
    font-size: 12px;
    line-height: 1.2;
    margin: 4px 0;
    white-space: pre-line;
    overflow: hidden;
    min-height: 2.4em;
}

.card-body {
    padding: 4px;
    display: flex;
    flex-direction: column;
    flex: 1;
}

.card button {
    margin-top: auto;
}

.tag {
    display: inline-block;
    background: #4a90e2;
    color: white;
    padding: 2px 6px;
    border-radius: 999px;
    margin: 2px;
    font-size: 11px;
    cursor: pointer;
}

.tags {
    min-height: 28px;
    display: flex;
    flex-wrap: wrap;
}

#pagination{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:15px;
}

/* モーダル */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:15px;
    border-radius:10px;
    width:90%;
    max-width:400px;
}
</style>
</head>

<body>

<h1>💎 宝石図鑑</h1>

<div class="form">
<input type="file" id="photo" accept="image/*">
<textarea id="name" placeholder="宝石名"></textarea>
<input type="text" id="tags" placeholder="タグ（カンマ区切り）">
<button onclick="saveGem()">登録</button>
</div>

<input type="text" id="search" placeholder="検索" oninput="render()">
<button onclick="clearTagFilter()">タグ解除</button>

<div id="gallery" class="grid"></div>

<div id="pagination">
<button onclick="prevPage()">← 前</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">次 →</button>
</div>

<!-- 編集 -->
<div id="modal" class="modal">
<div class="modal-content">

<h3>編集</h3>

<textarea id="editName"></textarea>
<input id="editTags">

<button onclick="saveEdit()">保存</button>
<button onclick="closeModal()">キャンセル</button>

</div>
</div>

<script>

let gems = JSON.parse(localStorage.getItem("gems")) || [];

let currentTag = "";
let currentPage = 1;
const pageSize = 12;

let editId = null;

/* ---------------- 登録 ---------------- */
function saveGem(){

    const file = document.getElementById("photo").files[0];
    const name = document.getElementById("name").value;
    const tags = document.getElementById("tags").value;

    if(!file || !name){
        alert("写真と名前必須");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        gems.push({
            id: Date.now(),
            image: e.target.result,
            name,
            tags
        });

        localStorage.setItem("gems", JSON.stringify(gems));
        render();
    };

    reader.readAsDataURL(file);
}

/* ---------------- フィルタ ---------------- */
function getFiltered(){

    const keyword =
        document.getElementById("search")
        .value.toLowerCase();

    return gems.filter(g => {

        const keywordMatch =
            g.name.toLowerCase().includes(keyword) ||
            g.tags.toLowerCase().includes(keyword);

        const tagMatch =
            currentTag === "" ||
            (g.tags || "")
                .split(",")
                .map(t => t.trim())
                .includes(currentTag);

        return keywordMatch && tagMatch;
    });
}

/* ---------------- ソート ---------------- */
function render(){

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    const filtered = getFiltered();

    filtered.sort((a, b) => {

        const tagsA = (a.tags || "")
            .split(",")
            .map(t => t.trim())
            .filter(t => t);

        const tagsB = (b.tags || "")
            .split(",")
            .map(t => t.trim())
            .filter(t => t);

        const a1 = (tagsA[0] || "").toLowerCase();
        const b1 = (tagsB[0] || "").toLowerCase();

        const first = a1.localeCompare(b1);
        if(first !== 0) return first;

        const a2 = (tagsA[1] || "").toLowerCase();
        const b2 = (tagsB[1] || "").toLowerCase();

        const second = a2.localeCompare(b2);
        if(second !== 0) return second;

        const nameA = (a.name || "").toLowerCase();
        const nameB = (b.name || "").toLowerCase();

        return nameA.localeCompare(nameB);
    });

    const start = (currentPage - 1) * pageSize;
    const pageItems = filtered.slice(start, start + pageSize);

    pageItems.forEach(g => {

        const index = gems.findIndex(x => x.id === g.id);

        gallery.innerHTML += `
        <div class="card">

            <img src="${g.image}">

            <div class="card-body">

                <h3>${g.name}</h3>

                <div class="tags">
                ${(g.tags || "")
                    .split(",")
                    .map(t => t.trim())
                    .filter(t => t)
                    .map(tag =>
                        `<span class="tag" onclick="filterByTag('${tag}')">#${tag}</span>`
                    ).join("")}
                </div>

                <button onclick="openEdit(${g.id})">編集</button>
                <button onclick="deleteGem(${g.id})">削除</button>

            </div>
        </div>
        `;
    });

    const max = Math.ceil(filtered.length / pageSize);
    document.getElementById("pageInfo").textContent =
        `${currentPage} / ${max || 1}`;
}

/* ---------------- 削除 ---------------- */
function deleteGem(id){
    if(confirm("削除する？")){
        gems = gems.filter(g => g.id !== id);
        localStorage.setItem("gems", JSON.stringify(gems));
        render();
    }
}

/* ---------------- 編集 ---------------- */
function openEdit(id){
    editId = id;
    const g = gems.find(x => x.id === id);

    document.getElementById("editName").value = g.name;
    document.getElementById("editTags").value = g.tags;

    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
    editId = null;
}

function saveEdit(){

    const g = gems.find(x => x.id === editId);

    g.name = document.getElementById("editName").value;
    g.tags = document.getElementById("editTags").value;

    localStorage.setItem("gems", JSON.stringify(gems));

    closeModal();
    render();
}

/* ---------------- UI ---------------- */
function filterByTag(tag){
    currentTag = tag;
    currentPage = 1;
    render();
}

function clearTagFilter(){
    currentTag = "";
    currentPage = 1;
    render();
}

function nextPage(){
    currentPage++;
    render();
}

function prevPage(){
    if(currentPage > 1){
        currentPage--;
        render();
    }
}

render();

</script>

</body>
</html>
