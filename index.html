<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>宝石図鑑</title>

<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:20px;
}

h1{
    text-align:center;
}

/* 入力 */
.form{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    box-sizing:border-box;
}

/* グリッド */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
    align-items:stretch;
}

/* カード（重要：固定構造） */
.card{
    background:white;
    border-radius:8px;
    box-shadow:0 1px 3px rgba(0,0,0,.15);

    display:flex;
    flex-direction:column;

    height:220px; /* ←安定の核 */
    overflow:hidden;
}

/* 画像 */
.card img{
    width:100%;
    height:80px;
    object-fit:cover;
}

/* 名前 */
.card h3{
    font-size:12px;
    margin:4px;
    line-height:1.2;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;

    min-height:2.4em;
}

/* 中身 */
.card-body{
    padding: 4px;
    display: flex;
    flex-direction: column;
    flex: 1;
    justify-content: space-between; /* ←重要 */
}

/* ===== タグ専用“固定枠” ===== */
.tag-area{
    min-height:50px; /* ←ここが「空白スペース」 */
    padding:4px;

    display:flex;
    flex-wrap:wrap;
    gap:2px;

    align-content:flex-start;
}

/* タグ */
.tag{
    display:inline-block;
    background:#4a90e2;
    color:white;
    padding:2px 6px;
    border-radius:999px;
    font-size:11px;
    white-space:nowrap;
}

/* ボタン固定エリア */
.button-area{
    height: 40px;        /* ←固定枠 */
    display: flex;
    gap: 4px;
    padding: 4px;
    align-items: center;
}

/* ボタン */
button{
    padding:4px 6px;
    font-size:10px;
    cursor:pointer;
}

/* ページ */
#pagination{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:15px;
}
</style>
</head>

<body>

<h1>💎 宝石図鑑</h1>

<div class="form">
<input id="photo" type="file">
<input id="name" placeholder="宝石名">
<input id="tags" placeholder="タグ（カンマ区切り）">
<button onclick="saveGem()">登録</button>
</div>

<div id="gallery" class="grid"></div>

<div id="pagination">
<button onclick="prevPage()">← 前</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">次 →</button>
</div>

<script>

let gems = JSON.parse(localStorage.getItem("gems")) || [];
let currentPage = 1;
const pageSize = 12;

/* 登録 */
function saveGem(){

    const file = document.getElementById("photo").files[0];
    const name = document.getElementById("name").value;
    const tags = document.getElementById("tags").value;

    if(!file || !name) return alert("必須");

    const reader = new FileReader();

    reader.onload = e => {

        gems.push({
            id:Date.now(),
            image:e.target.result,
            name,
            tags
        });

        localStorage.setItem("gems",JSON.stringify(gems));
        render();
    };

    reader.readAsDataURL(file);
}

/* 表示 */
function render(){

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    const start = (currentPage - 1) * pageSize;
    const pageItems = gems.slice(start, start + pageSize);

    pageItems.forEach(g => {

        gallery.innerHTML += `
        <div class="card">

            <img src="${g.image}">

            <div class="card-body">

                <h3>${g.name}</h3>

                <!-- タグ専用スペース（ここが重要） -->
                <div class="tag-area">
                ${(g.tags || "")
                    .split(",")
                    .map(t => t.trim())
                    .filter(t => t)
                    .map(t =>
                        `<span class="tag">#${t}</span>`
                    ).join("")}
                </div>

                <!-- ボタン専用スペース -->
                <div class="button-area">
                    <button onclick="deleteGem(${g.id})">削除</button>
                </div>

            </div>
        </div>
        `;
    });

    document.getElementById("pageInfo").textContent =
        `${currentPage}`;
}

/* 削除 */
function deleteGem(id){
    gems = gems.filter(g => g.id !== id);
    localStorage.setItem("gems",JSON.stringify(gems));
    render();
}

/* ページ */
function nextPage(){
    currentPage++;
    render();
}

function prevPage(){
    if(currentPage > 1){
        currentPage--;
        render();
    }
}

render();

</script>

</body>
</html>
